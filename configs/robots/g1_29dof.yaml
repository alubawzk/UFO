name: g1_29dof
xml_path: humanoidverse/data/robots/g1_mjlab/g1_29dof.xml

base_body: pelvis
root_quat_order: xyzw
coordinate_system: z_up
dof_unit: rad

control_joints:
  mode: all_actuated

feet:
  - left_ankle_roll_link
  - right_ankle_roll_link

hands:
  - left_wrist_yaw_link
  - right_wrist_yaw_link

key_bodies:
  - pelvis
  - torso_link
  - left_ankle_roll_link
  - right_ankle_roll_link
  - left_wrist_yaw_link
  - right_wrist_yaw_link

default_dof_pos: {}

training:
  hydra_robot: g1/g1_29dof_hard_waist
  hydra_overrides:
    - env.config.lie_down_init=True
    - env.config.lie_down_init_prob=0.3
  semantics:
    contact_bodies:
      - left_ankle_roll_link
      - right_ankle_roll_link
    undesired_contact_bodies:
      - pelvis
      - shoulder
      - hip
    torso_name: torso_link
    left_ankle_dof_names:
      - left_ankle_pitch_joint
      - left_ankle_roll_joint
    right_ankle_dof_names:
      - right_ankle_pitch_joint
      - right_ankle_roll_joint
  init_state:
    pos: [0.0, 0.0, 0.8]
    rot: [0.0, 0.0, 0.0, 1.0]
    lin_vel: [0.0, 0.0, 0.0]
    ang_vel: [0.0, 0.0, 0.0]
    default_joint_angles:
      left_hip_pitch_joint: -0.1
      left_hip_roll_joint: 0.0
      left_hip_yaw_joint: 0.0
      left_knee_joint: 0.3
      left_ankle_pitch_joint: -0.2
      left_ankle_roll_joint: 0.0
      right_hip_pitch_joint: -0.1
      right_hip_roll_joint: 0.0
      right_hip_yaw_joint: 0.0
      right_knee_joint: 0.3
      right_ankle_pitch_joint: -0.2
      right_ankle_roll_joint: 0.0
      waist_yaw_joint: 0.0
      waist_roll_joint: 0.0
      waist_pitch_joint: 0.0
      left_shoulder_pitch_joint: 0.0
      left_shoulder_roll_joint: 0.0
      left_shoulder_yaw_joint: 0.0
      left_elbow_joint: 0.0
      left_wrist_roll_joint: 0.0
      left_wrist_pitch_joint: 0.0
      left_wrist_yaw_joint: 0.0
      right_shoulder_pitch_joint: 0.0
      right_shoulder_roll_joint: 0.0
      right_shoulder_yaw_joint: 0.0
      right_elbow_joint: 0.0
      right_wrist_roll_joint: 0.0
      right_wrist_pitch_joint: 0.0
      right_wrist_yaw_joint: 0.0
