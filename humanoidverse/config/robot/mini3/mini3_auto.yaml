# @package _global_

# Mini3 robot layout. Runtime values sourced from configs/robots/mini3.yaml
# overwrite the duplicated limits/control fields below.
defaults:
  - robot_base

robot:
  num_bodies: 24
  dof_obs_size: 21
  actions_dim: 21
  lower_body_actions_dim: 12
  upper_body_actions_dim: 9
  body_keys: [lower_body, upper_body]
  policy_obs_dim: -1
  critic_obs_dim: -1

  key_bodies: [base_link, waist_yaw_link, left_ankle_roll_link, right_ankle_roll_link, left_elbow_pitch_link, right_elbow_pitch_link]
  contact_bodies: [left_ankle_roll_link, right_ankle_roll_link]
  num_feet: 2
  left_foot_name: left_ankle_roll_link
  right_foot_name: right_ankle_roll_link
  foot_name: ankle_roll_link
  knee_name: knee_pitch_link
  has_torso: true
  torso_name: waist_yaw_link
  has_upper_body_dof: true

  dof_names: &mini3_dof_names
    [left_hip_pitch_joint, left_hip_roll_joint, left_hip_yaw_joint, left_knee_pitch_joint, left_ankle_pitch_joint, left_ankle_roll_joint,
     right_hip_pitch_joint, right_hip_roll_joint, right_hip_yaw_joint, right_knee_pitch_joint, right_ankle_pitch_joint, right_ankle_roll_joint,
     waist_yaw_joint,
     left_shoulder_pitch_joint, left_shoulder_roll_joint, left_shoulder_yaw_joint, left_elbow_pitch_joint,
     right_shoulder_pitch_joint, right_shoulder_roll_joint, right_shoulder_yaw_joint, right_elbow_pitch_joint]
  lower_dof_names:
    [left_hip_pitch_joint, left_hip_roll_joint, left_hip_yaw_joint, left_knee_pitch_joint, left_ankle_pitch_joint, left_ankle_roll_joint,
     right_hip_pitch_joint, right_hip_roll_joint, right_hip_yaw_joint, right_knee_pitch_joint, right_ankle_pitch_joint, right_ankle_roll_joint]
  upper_dof_names:
    [waist_yaw_joint,
     left_shoulder_pitch_joint, left_shoulder_roll_joint, left_shoulder_yaw_joint, left_elbow_pitch_joint,
     right_shoulder_pitch_joint, right_shoulder_roll_joint, right_shoulder_yaw_joint, right_elbow_pitch_joint]
  waist_dof_names: [waist_yaw_joint]
  waist_yaw_dof_name: waist_yaw_joint
  arm_dof_names:
    [left_shoulder_pitch_joint, left_shoulder_roll_joint, left_shoulder_yaw_joint, left_elbow_pitch_joint,
     right_shoulder_pitch_joint, right_shoulder_roll_joint, right_shoulder_yaw_joint, right_elbow_pitch_joint]
  left_arm_dof_names: [left_shoulder_pitch_joint, left_shoulder_roll_joint, left_shoulder_yaw_joint, left_elbow_pitch_joint]
  right_arm_dof_names: [right_shoulder_pitch_joint, right_shoulder_roll_joint, right_shoulder_yaw_joint, right_elbow_pitch_joint]
  upper_left_arm_dof_names: [left_shoulder_pitch_joint, left_shoulder_roll_joint, left_shoulder_yaw_joint, left_elbow_pitch_joint]
  upper_right_arm_dof_names: [right_shoulder_pitch_joint, right_shoulder_roll_joint, right_shoulder_yaw_joint, right_elbow_pitch_joint]
  left_ankle_dof_names: [left_ankle_pitch_joint, left_ankle_roll_joint]
  right_ankle_dof_names: [right_ankle_pitch_joint, right_ankle_roll_joint]
  knee_dof_names: [left_knee_pitch_joint, right_knee_pitch_joint]

  dof_pos_lower_limit_list:
    [-1.8326, -0.8727, -1.9199, -0.3491, -0.7, -0.518,
     -1.8326, -1.3963, -1.9199, -0.3491, -0.7, -0.518,
     -2.618,
     -3.4907, -0.1745, -1.5708, -0.576,
     -3.4907, -3.1416, -1.5708, -0.576]
  dof_pos_upper_limit_list:
    [1.8326, 1.3963, 1.9199, 1.9199, 0.7, 0.518,
     1.8326, 0.8727, 1.9199, 1.9199, 0.7, 0.518,
     2.618,
     1.0472, 3.1416, 1.5708, 3.8397,
     1.0472, 0.1745, 1.5708, 3.8397]
  dof_vel_limit_list: [10.0, 10.0, 10.0, 10.0, 45.0, 45.0, 10.0, 10.0, 10.0, 10.0, 45.0, 45.0, 10.0, 45.0, 45.0, 45.0, 45.0, 45.0, 45.0, 45.0, 45.0]
  dof_effort_limit_list: [27.0, 27.0, 27.0, 27.0, 25.0, 25.0, 27.0, 27.0, 27.0, 27.0, 25.0, 25.0, 27.0, 12.5, 12.5, 12.5, 12.5, 12.5, 12.5, 12.5, 12.5]
  dof_effort_limit_scale: 1.0

  body_names: &mini3_body_names
    [base_link, imu_link,
     left_hip_pitch_link, left_hip_roll_link, left_hip_yaw_link, left_knee_pitch_link, left_ankle_pitch_link, left_ankle_roll_link,
     right_hip_pitch_link, right_hip_roll_link, right_hip_yaw_link, right_knee_pitch_link, right_ankle_pitch_link, right_ankle_roll_link,
     waist_yaw_link, head_link,
     left_shoulder_pitch_link, left_shoulder_roll_link, left_shoulder_yaw_link, left_elbow_pitch_link,
     right_shoulder_pitch_link, right_shoulder_roll_link, right_shoulder_yaw_link, right_elbow_pitch_link]

  terminate_after_contacts_on: &mini3_undesired_contacts
    [base_link, waist_yaw_link, head_link, left_hip_roll_link, right_hip_roll_link, left_shoulder_roll_link, right_shoulder_roll_link]
  penalize_contacts_on: *mini3_undesired_contacts

  init_state:
    pos: [0.0, 0.0, 0.46305]
    rot: [0.0, 0.0, 0.0, 1.0]
    lin_vel: [0.0, 0.0, 0.0]
    ang_vel: [0.0, 0.0, 0.0]
    default_joint_angles:
      left_hip_pitch_joint: 0.0
      left_hip_roll_joint: 0.0
      left_hip_yaw_joint: 0.0
      left_knee_pitch_joint: 0.0
      left_ankle_pitch_joint: 0.0
      left_ankle_roll_joint: 0.0
      right_hip_pitch_joint: 0.0
      right_hip_roll_joint: 0.0
      right_hip_yaw_joint: 0.0
      right_knee_pitch_joint: 0.0
      right_ankle_pitch_joint: 0.0
      right_ankle_roll_joint: 0.0
      waist_yaw_joint: 0.0
      left_shoulder_pitch_joint: 0.0
      left_shoulder_roll_joint: 0.0
      left_shoulder_yaw_joint: 0.0
      left_elbow_pitch_joint: 0.0
      right_shoulder_pitch_joint: 0.0
      right_shoulder_roll_joint: 0.0
      right_shoulder_yaw_joint: 0.0
      right_elbow_pitch_joint: 0.0

  randomize_link_body_names:
    [base_link, waist_yaw_link,
     left_hip_pitch_link, left_hip_roll_link, left_hip_yaw_link, left_knee_pitch_link,
     right_hip_pitch_link, right_hip_roll_link, right_hip_yaw_link, right_knee_pitch_link]

  control:
    control_type: P
    stiffness:
      left_hip_pitch_joint: 60.0
      left_hip_roll_joint: 55.0
      left_hip_yaw_joint: 25.0
      left_knee_pitch_joint: 60.0
      left_ankle_pitch_joint: 50.0
      left_ankle_roll_joint: 45.0
      right_hip_pitch_joint: 60.0
      right_hip_roll_joint: 55.0
      right_hip_yaw_joint: 25.0
      right_knee_pitch_joint: 60.0
      right_ankle_pitch_joint: 50.0
      right_ankle_roll_joint: 45.0
      waist_yaw_joint: 65.0
      left_shoulder_pitch_joint: 30.0
      left_shoulder_roll_joint: 25.0
      left_shoulder_yaw_joint: 30.0
      left_elbow_pitch_joint: 20.0
      right_shoulder_pitch_joint: 30.0
      right_shoulder_roll_joint: 25.0
      right_shoulder_yaw_joint: 30.0
      right_elbow_pitch_joint: 20.0
    damping:
      left_hip_pitch_joint: 4.5
      left_hip_roll_joint: 2.8
      left_hip_yaw_joint: 1.1
      left_knee_pitch_joint: 4.5
      left_ankle_pitch_joint: 1.2
      left_ankle_roll_joint: 1.2
      right_hip_pitch_joint: 4.5
      right_hip_roll_joint: 2.8
      right_hip_yaw_joint: 1.1
      right_knee_pitch_joint: 4.5
      right_ankle_pitch_joint: 1.2
      right_ankle_roll_joint: 1.2
      waist_yaw_joint: 3.0
      left_shoulder_pitch_joint: 1.0
      left_shoulder_roll_joint: 2.0
      left_shoulder_yaw_joint: 1.0
      left_elbow_pitch_joint: 1.0
      right_shoulder_pitch_joint: 1.0
      right_shoulder_roll_joint: 2.0
      right_shoulder_yaw_joint: 1.0
      right_elbow_pitch_joint: 1.0
    integral: {hip: 0.0, knee: 0.0, ankle: 0.0, waist: 0.0, shoulder: 0.0, elbow: 0.0}
    action_scale: 0.25
    action_clip_value: 5.0
    action_rescale: true
    clip_torques: true
    normalize_action: true
    normalize_action_from: 1.0
    normalize_action_to: 5.0

  asset:
    collapse_fixed_joints: true
    replace_cylinder_with_capsule: true
    flip_visual_attachments: false
    armature: 0.001
    thickness: 0.01
    max_angular_velocity: 1000.0
    max_linear_velocity: 1000.0
    density: 0.001
    angular_damping: 0.0
    linear_damping: 0.0
    urdf_file: null
    usd_file: null
    xml_file: humanoidverse/data/robots/mini3_mjlab/mini3.xml
    robot_type: mini3
    self_collisions: 0
    default_dof_drive_mode: 3
    fix_base_link: false

  motion:
    motion_file: null
    asset:
      assetRoot: humanoidverse/data/robots/mini3_mjlab
      assetFileName: mini3.xml
      urdfFileName: null
    humanoid_type: mini3
    bias_offset: false
    has_self_collision: true
    has_mesh: false
    has_jt_limit: false
    has_dof_subset: true
    has_upright_start: true
    has_smpl_pd_offset: false
    remove_toe: false
    motion_sym_loss: false
    sym_loss_coef: 1
    big_ankle: false
    has_shape_obs: false
    has_shape_obs_disc: false
    has_shape_variation: false
    uniform_sample: false
    motion_fps_scale: 1.0
    standardize_motion_length: true
    standardize_motion_length_value: 10
    reverse_motion: false
    body_names: *mini3_body_names
    dof_names: *mini3_dof_names
    nums_extend_bodies: 0
    extend_config: []

  metadata:
    generated_by: manual Mini3 adaptation
    review_status: draft
    warnings:
      - Verify the supplied Mini3 reference PD gains and confirm contact/termination semantics before formal training.
